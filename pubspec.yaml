name: vagina
description: "VAGINA: Voice AGI Notepad Agent - a hosted voice assistant client"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  google_fonts: ^8.0.2
  web: ^1.1.0
  crypto: ^3.0.6

  # Networking / generated API client
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # State management
  flutter_riverpod: ^3.1.0
  riverpod: ^3.1.0
  riverpod_annotation: any

  # Audio handling
  taudio: ^10.0.0
  record: ^6.2.0

  # Network & WebSocket
  web_socket_channel: ^3.0.3
  http: ^1.4.0

  # Environment configuration
  flutter_dotenv: ^6.0.1

  # Permissions
  permission_handler: ^12.0.1

  # File storage
  path_provider: ^2.1.6
  device_info_plus: ^12.3.0
  flutter_markdown: ^0.7.7+1
  share_plus: ^12.0.1
  wakelock_plus: ^1.5.1

  # Window management
  window_manager: ^0.5.2
  just_audio: ^0.10.5
  path: ^1.9.1
  async: ^2.13.1
  logging: ^1.3.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  app_links: ^6.4.1
  win32_registry: ^2.1.0
  cbor: ^6.5.1
  uuid: ^4.5.3
  file_picker: ^11.0.2
  pasteboard: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.15.1
  freezed: ^3.1.0
  json_serializable: ^6.11.1
  riverpod_generator: any
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  florval: ^0.3.14
  mockito: ^5.6.4
  msix: 3.18.0

msix_config:
  display_name: VAGINA
  identity_name: app.aoki.yuki.vagina
  publisher: CN=AokiApp Inc.
  publisher_display_name: AokiApp Inc.
  logo_path: assets/icons/ios/iTunesArtwork@3x.png
  capabilities: internetClient, microphone
  protocol_activation: app.aoki.yuki.vagina
  architecture: x64
  build_windows: false
  output_path: build/windows/msix
  trim_logo: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/audio/
    - assets/announcements/
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/NotoSansJP-VariableFont_wght.ttf
          weight: 700
