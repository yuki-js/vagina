name: Publish release builds

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.44.6"

jobs:
  build-android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the released tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required Android signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Prepare Android signing credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore"
          chmod 600 "$RUNNER_TEMP/release-keystore"

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Stage Android release asset
        run: cp build/app/outputs/flutter-apk/app-release.apk vagina-android.apk

      - name: Upload Android build
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: vagina-android.apk
          if-no-files-found: error

      - name: Remove Android signing credentials
        if: ${{ always() }}
        shell: bash
        run: rm -f "$RUNNER_TEMP/release-keystore"

  build-ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out the released tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build unsigned release archive
        run: flutter build ipa --release --no-codesign

      - name: Create unsigned IPA
        shell: bash
        run: |
          app_path="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p build/ios/release/Payload
          cp -R "$app_path" build/ios/release/Payload/
          (cd build/ios/release && zip -r ../../../vagina-ios-unsigned.ipa Payload)

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: release-ios
          path: vagina-ios-unsigned.ipa
          if-no-files-found: error

  build-windows:
    name: Build Windows release assets
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Check out the released tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath vagina-windows-x64.zip `
            -Force

      - name: Validate optional Windows signing secrets
        id: windows-signing
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: powershell
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PFX)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)
          if ($hasPfx -xor $hasPassword) {
            throw "WINDOWS_CERT_PFX and WINDOWS_CERT_PASSWORD must either both be configured or both be absent."
          }
          "enabled=$($hasPfx -and $hasPassword)".ToLowerInvariant() >> $env:GITHUB_OUTPUT

      - name: Decode Windows signing certificate
        if: ${{ steps.windows-signing.outputs.enabled == 'true' }}
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
        shell: powershell
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "vagina-sideload.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))

      - name: Build signed sideload MSIX
        if: ${{ steps.windows-signing.outputs.enabled == 'true' }}
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: powershell
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "vagina-sideload.pfx"
          .\scripts\package_windows_msix.ps1 `
            -Mode Sideload `
            -CertificatePath $pfxPath `
            -CertificatePassword $env:WINDOWS_CERT_PASSWORD
          Copy-Item build\windows\msix\sideload\*.msix vagina-windows-x64-sideload.msix

      - name: Export public Windows certificate
        if: ${{ steps.windows-signing.outputs.enabled == 'true' }}
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: powershell
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "vagina-sideload.pfx"
          $certificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $pfxPath,
            $env:WINDOWS_CERT_PASSWORD,
            [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          )
          try {
            $publicCertificate = $certificate.Export(
              [System.Security.Cryptography.X509Certificates.X509ContentType]::Cert
            )
            [IO.File]::WriteAllBytes("vagina-windows-sideload.cer", $publicCertificate)
          } finally {
            $certificate.Dispose()
          }

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: vagina-windows-x64.zip
          if-no-files-found: error

      - name: Upload signed Windows assets
        if: ${{ steps.windows-signing.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-sideload
          path: |
            vagina-windows-x64-sideload.msix
            vagina-windows-sideload.cer
          if-no-files-found: error

      - name: Remove private Windows certificate
        if: ${{ always() }}
        shell: powershell
        run: Remove-Item (Join-Path $env:RUNNER_TEMP "vagina-sideload.pfx") -Force -ErrorAction SilentlyContinue

  publish:
    name: Attach builds to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]
    permissions:
      contents: write
    steps:
      - name: Download release builds
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Attach builds to the published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: gh release upload "$RELEASE_TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
