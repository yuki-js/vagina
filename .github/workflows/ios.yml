name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Restrict permissions for security
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true
      
      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

  build-ios-debug:
    name: Build iOS (Debug)
    runs-on: macos-latest
    needs: [analyze]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true
      
      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      
      - name: Build iOS (debug, no codesign)
        run: flutter build ipa --debug --no-codesign

      - name: Create IPA from archive
        run: |
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload
          rm -rf Payload

      - name: Upload Debug IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-debug-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14

  build-ios-release:
    name: Build iOS (Release)
    runs-on: macos-latest
    needs: [analyze]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true
      
      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      
      - name: Build iOS (release, no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Create IPA from archive
        run: |
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload
          rm -rf Payload

      - name: Upload Release IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30
