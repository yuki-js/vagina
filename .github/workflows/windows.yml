name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict permissions for security
permissions:
  contents: read

jobs:
  # Pre-processing job on Linux for platform-independent tasks
  preprocess:
    name: Preprocess (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: "stable"
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-windows-debug:
    name: Build Windows (Debug)
    runs-on: windows-latest
    needs: [preprocess]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: "stable"
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Windows native build tree (debug)
        uses: actions/cache@v6
        with:
          path: build\windows\x64
          key: >-
            windows-native-v2-${{ runner.os }}-${{ runner.arch }}-debug-${{
              hashFiles(
                'pubspec.yaml',
                'pubspec.lock',
                'windows/**',
                'lib/**',
                'assets/**',
                'openapi/**',
                'l10n.yaml',
                'scripts/prebuild.sh',
                '.github/workflows/windows.yml'
              )
            }}

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Build Windows (debug)
        run: flutter build windows --debug

      - name: Package debug build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Debug\* -DestinationPath build\windows\vagina-debug-windows.zip -Force
        shell: powershell

      - name: Upload Debug Build
        uses: actions/upload-artifact@v7
        with:
          name: windows-debug-build
          path: build\windows\vagina-debug-windows.zip
          retention-days: 14

  build-windows-release:
    name: Build Windows (Release)
    runs-on: windows-latest
    needs: [preprocess]
    permissions:
      contents: read
    env:
      WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: "stable"
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Windows native build tree (release)
        uses: actions/cache@v6
        with:
          path: build\windows\x64
          key: >-
            windows-native-v2-${{ runner.os }}-${{ runner.arch }}-release-${{
              hashFiles(
                'pubspec.yaml',
                'pubspec.lock',
                'windows/**',
                'lib/**',
                'assets/**',
                'openapi/**',
                'l10n.yaml',
                'scripts/prebuild.sh',
                '.github/workflows/windows.yml'
              )
            }}

      - name: Install dependencies
        run: flutter pub get

      - name: Prebuild generated sources
        run: bash scripts/prebuild.sh

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Package release build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\vagina-release-windows.zip -Force
        shell: powershell

      - name: Upload Release Build
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-build
          path: build\windows\vagina-release-windows.zip
          retention-days: 30

      - name: Build and validate Microsoft Store MSIX
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        run: |
          .\scripts\package_windows_msix.ps1 -Mode Store
        shell: powershell

      - name: Upload Microsoft Store MSIX
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-store-msix
          path: build\windows\msix\store\*.msix
          if-no-files-found: error
          retention-days: 30

      - name: Decode sideload certificate
        if: >-
          ${{
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
            env.WINDOWS_CERT_PFX != '' &&
            env.WINDOWS_CERT_PASSWORD != ''
          }}
        run: |
          $certBytes = [Convert]::FromBase64String("$env:WINDOWS_CERT_PFX")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\vagina-sideload.pfx", $certBytes)
        shell: powershell

      - name: Build and validate signed sideload MSIX
        if: >-
          ${{
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
            env.WINDOWS_CERT_PFX != '' &&
            env.WINDOWS_CERT_PASSWORD != ''
          }}
        run: |
          .\scripts\package_windows_msix.ps1 `
            -Mode Sideload `
            -CertificatePath "$env:RUNNER_TEMP\vagina-sideload.pfx" `
            -CertificatePassword "$env:WINDOWS_CERT_PASSWORD"
        shell: powershell

      - name: Upload signed sideload MSIX
        if: >-
          ${{
            (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
            env.WINDOWS_CERT_PFX != '' &&
            env.WINDOWS_CERT_PASSWORD != ''
          }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-sideload-msix
          path: build\windows\msix\sideload\*.msix
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup sideload certificate
        if: ${{ always() }}
        run: |
          Remove-Item "$env:RUNNER_TEMP\vagina-sideload.pfx" -ErrorAction SilentlyContinue
        shell: powershell
