<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VAGINA: Voice AGI Notepad Agent - a hosted voice assistant client">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VAGINA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- PWA meta tags -->
  <meta name="theme-color" content="#0175C2">
  
  <!-- Permissions Policy for clipboard write -->
  <meta http-equiv="Permissions-Policy" content="clipboard-write=*">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VAGINA</title>
  <link rel="manifest" href="manifest.json">

  <!-- Flutter SoLoud's WebAssembly module must be loaded before audio use. -->
  <script src="assets/packages/flutter_soloud/web/libflutter_soloud_plugin.js" defer></script>
  <script src="assets/packages/flutter_soloud/web/init_module.dart.js" defer></script>

  <style>
    #oauth-callback-status {
      display: none;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 48px 24px;
      font: 16px/1.5 system-ui, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <main id="oauth-callback-status" role="status"></main>
  <script>
    (() => {
      const callbackPath = '/callback';
      const nativeCallback = 'app.aoki.yuki.vagina://oauth/callback';
      const allowedParameters = ['code', 'state', 'error', 'error_description'];
      const parameters = new URLSearchParams(window.location.search);
      const isCallback = window.location.pathname === callbackPath &&
          allowedParameters.some((name) => parameters.has(name));

      if (!isCallback) {
        window.__vaginaLoadFlutter = true;
        return;
      }

      const state = (parameters.get('state') || '').trim();
      const match = /^([wmd])\.(.+)$/.exec(state);
      if (!match) {
        showStatus('Sign-in callback failed because its state is invalid.');
        window.__vaginaLoadFlutter = false;
        return;
      }

      if (match[1] === 'w') {
        window.__vaginaLoadFlutter = true;
        return;
      }

      const forwarded = new URLSearchParams();
      for (const name of allowedParameters) {
        if (parameters.has(name)) {
          forwarded.set(name, parameters.get(name));
        }
      }

      window.__vaginaLoadFlutter = false;
      showStatus('Returning to the VAGINA app… If it does not open, return to the app manually.');
      window.location.replace(`${nativeCallback}?${forwarded.toString()}`);

      function showStatus(message) {
        const status = document.getElementById('oauth-callback-status');
        status.textContent = message;
        status.style.display = 'block';
      }
    })();
  </script>
  <script>
    if (window.__vaginaLoadFlutter) {
      const bootstrap = document.createElement('script');
      bootstrap.src = 'flutter_bootstrap.js';
      bootstrap.async = true;
      document.body.appendChild(bootstrap);
    }
  </script>
</body>
</html>
