openapi: 3.0.3
info:
  title: VAGINA Server API
  description: REST API for the VAGINA application backend
  version: 0.0.1
servers:
- url: /api
  description: API base path
paths:
  /auth/oidc/providers:
    get:
      tags:
      - auth
      summary: List enabled OIDC providers
      description: Return OIDC providers that are implemented and configured on this
        server.
      operationId: listOidcProviders
      responses:
        "200":
          description: Enabled OIDC providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  required:
                  - displayName
                  - id
                  type: object
                  properties:
                    id:
                      minLength: 1
                      type: string
                      example: github
                    displayName:
                      minLength: 1
                      type: string
                      example: GitHub
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /auth/oidc/{provider}/start:
    post:
      tags:
      - auth
      summary: Start OIDC login
      description: Create an OIDC authorization request for the selected provider.
      operationId: startOidcLogin
      parameters:
      - name: provider
        in: path
        description: "OIDC provider key (for example `github`, `harigata`)."
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
              - codeChallenge
              - codeChallengeMethod
              type: object
              properties:
                clientType:
                  type: string
                  description: "The type of client initiating the OIDC login, used\
                    \ to determine appropriate redirect URIs and other provider-specific\
                    \ parameters."
                  default: web
                  enum:
                  - web
                  - mobile
                  - desktop
                codeChallenge:
                  minLength: 1
                  type: string
                  description: PKCE code challenge generated by client.
                codeChallengeMethod:
                  type: string
                  description: PKCE challenge method.
                  enum:
                  - S256
        required: true
      responses:
        "200":
          description: OIDC authorization request created.
          content:
            application/json:
              schema:
                required:
                - authorizationUrl
                type: object
                properties:
                  authorizationUrl:
                    type: string
                    format: uri
        "400":
          description: Invalid request or unsupported provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "501":
          description: Provider not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Upstream OIDC provider request failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /auth/oidc/{provider}/exchange:
    post:
      tags:
      - auth
      summary: Exchange OIDC authorization code
      description: Exchange an OIDC authorization code for VAGINA server tokens.
      operationId: exchangeOidcLogin
      parameters:
      - name: provider
        in: path
        description: "OIDC provider key (for example `github`, `harigata`)."
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
              - code
              - codeVerifier
              - state
              type: object
              properties:
                code:
                  minLength: 1
                  type: string
                state:
                  minLength: 1
                  type: string
                codeVerifier:
                  minLength: 1
                  type: string
        required: true
      responses:
        "200":
          description: OIDC login exchanged for VAGINA server tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        "400":
          description: Invalid request or unsupported provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: OIDC authorization failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "501":
          description: Provider not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Upstream OIDC provider request failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh session
      description: Rotate an opaque refresh token and issue a new access token.
      operationId: refreshSession
      requestBody:
        content:
          application/json:
            schema:
              required:
              - refreshToken
              type: object
              properties:
                refreshToken:
                  minLength: 1
                  type: string
        required: true
      responses:
        "200":
          description: Session refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        "401":
          description: Invalid refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: Revoke an opaque refresh token.
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              required:
              - refreshToken
              type: object
              properties:
                refreshToken:
                  minLength: 1
                  type: string
        required: true
      responses:
        "204":
          description: Logged out.
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /me:
    get:
      tags:
      - auth
      summary: Get current user
      description: Retrieve the authenticated user associated with the access token.
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /speed-dials:
    get:
      tags:
      - speed-dials
      summary: List speed dials
      description: List the authenticated user's speed dial entries.
      operationId: listSpeedDials
      responses:
        "200":
          description: Speed dials.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpeedDial'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    post:
      tags:
      - speed-dials
      summary: Create speed dial
      description: Create one speed dial entry owned by the authenticated user. The
        server generates the persistent speed dial id.
      operationId: createSpeedDial
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeedDialCreateRequest'
        required: true
      responses:
        "201":
          description: Speed dial created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeedDial'
        "400":
          description: "Invalid request, including unknown voice agent id."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /speed-dials/{speedDialId}:
    get:
      tags:
      - speed-dials
      summary: Get speed dial
      description: Get one speed dial entry owned by the authenticated user.
      operationId: getSpeedDial
      parameters:
      - name: speedDialId
        in: path
        description: Speed dial identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      responses:
        "200":
          description: Speed dial.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeedDial'
        "404":
          description: Speed dial not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - speed-dials
      summary: Update speed dial
      description: Update one existing speed dial entry owned by the authenticated
        user. Missing resources are not created. The `default` speed dial id is protected
        from rename.
      operationId: updateSpeedDial
      parameters:
      - name: speedDialId
        in: path
        description: Speed dial identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeedDialUpdateRequest'
        required: true
      responses:
        "200":
          description: Speed dial updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeedDial'
        "400":
          description: "Invalid request, including unknown voice agent id."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Speed dial not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Speed dial cannot be updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - speed-dials
      summary: Delete speed dial
      description: Delete one speed dial entry owned by the authenticated user. The
        `default` speed dial id is protected.
      operationId: deleteSpeedDial
      parameters:
      - name: speedDialId
        in: path
        description: Speed dial identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      responses:
        "204":
          description: Speed dial deleted.
        "404":
          description: Speed dial not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Speed dial cannot be deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /sessions:
    get:
      tags:
      - sessions
      summary: List sessions
      description: List the authenticated user's non-deleted call sessions using cursor
        pagination ordered by newest start time first.
      operationId: listSessions
      parameters:
      - name: limit
        in: query
        description: Maximum number of sessions to return. Invalid values return HTTP
          400.
        required: false
        schema:
          maximum: 50
          minimum: 1
          type: integer
          default: 20
      - name: cursor
        in: query
        description: Opaque pagination cursor returned by the previous list response.
        required: false
        schema:
          minLength: 1
          type: string
      responses:
        "200":
          description: Session page.
          content:
            application/json:
              schema:
                required:
                - items
                - nextCursor
                type: object
                properties:
                  items:
                    type: array
                    items:
                      required:
                      - id
                      - startedAt
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        startedAt:
                          type: string
                          format: date-time
                        endedAt:
                          type: string
                          format: date-time
                          nullable: true
                      additionalProperties: false
                  nextCursor:
                    type: string
                    description: "Opaque cursor for the next page, or null when no\
                      \ next page exists."
                    nullable: true
                additionalProperties: false
        "400":
          description: "Invalid request, including invalid limit or cursor."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /sessions/{sessionId}:
    get:
      tags:
      - sessions
      summary: Get session
      description: Get one non-deleted call session owned by the authenticated user.
      operationId: getSession
      parameters:
      - name: sessionId
        in: path
        description: Session identifier.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Session detail.
          content:
            application/json:
              schema:
                required:
                - id
                - startedAt
                - thread
                - voiceAgentId
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  startedAt:
                    type: string
                    format: date-time
                  endedAt:
                    type: string
                    format: date-time
                    nullable: true
                  speedDialId:
                    type: string
                    nullable: true
                  voiceAgentId:
                    type: string
                  thread:
                    $ref: '#/components/schemas/SessionThread'
                additionalProperties: false
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - sessions
      summary: Delete session
      description: "Soft-delete one call session owned by the authenticated user.\
        \ Missing, already deleted, or other-owner records return HTTP 404."
      operationId: deleteSession
      parameters:
      - name: sessionId
        in: path
        description: Session identifier.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Session deleted.
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /sessions/bulk-delete:
    post:
      tags:
      - sessions
      summary: Bulk delete sessions
      description: "Soft-delete matching call sessions owned by the authenticated\
        \ user. Missing, already deleted, other-owner, and duplicate ids are ignored."
      operationId: bulkDeleteSessions
      requestBody:
        content:
          application/json:
            schema:
              required:
              - ids
              type: object
              properties:
                ids:
                  maxItems: 100
                  minItems: 1
                  type: array
                  items:
                    type: string
                    format: uuid
              additionalProperties: false
        required: true
      responses:
        "200":
          description: Bulk delete result.
          content:
            application/json:
              schema:
                required:
                - deletedCount
                type: object
                properties:
                  deletedCount:
                    minimum: 0
                    type: integer
                additionalProperties: false
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /vfs/rpc:
    post:
      tags:
      - vfs
      summary: Persisted VFS JSON-RPC
      description: Execute one persisted virtual filesystem operation using one JSON-RPC
        2.0 request object and one JSON-RPC 2.0 response object. Phase 1 supports
        no batch and no notification. Valid JSON-RPC requests always return HTTP 200.
        Domain failures are returned through the JSON-RPC `error` member.
      operationId: vfsRpc
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VfsRpcRequest'
        required: true
      responses:
        "200":
          description: JSON-RPC response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VfsRpcResponse'
        "400":
          description: Malformed JSON or invalid JSON-RPC envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Authorization failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /hosted-realtime/v1/connect:
    get:
      tags:
      - hosted-realtime
      summary: VHRP/1 WebSocket upgrade (discoverability stub)
      description: "WebSocket upgrade entry point for the hosted realtime voice protocol\
        \ (VHRP/1). This is a discoverability stub only: the connection is a binary\
        \ WebSocket exchanging CBOR frames, which OpenAPI cannot describe. Clients\
        \ may offer the `vhrp.cbor.v1` subprotocol, but it is not required. No request/response\
        \ body is modeled here on purpose. Authentication is NOT performed at upgrade\
        \ time; the first application message MUST be `session.open` carrying a JWT\
        \ in `body.token`. See the linked design docs for the full wire contract,\
        \ message types, and thread projection rules."
      externalDocs:
        description: VHRP/1 wire protocol and adapter design set
        url: https://github.com/vagina-ai/server/blob/main/../client/docs/hosted_realtime/02_vhrp_wire_protocol.md
      operationId: hostedRealtimeConnect
      parameters:
      - name: Sec-WebSocket-Protocol
        in: header
        description: Optional `vhrp.cbor.v1` subprotocol token.
        required: false
        schema:
          type: string
          example: vhrp.cbor.v1
      responses:
        "101":
          description: Switching Protocols. The HTTP connection is upgraded to a binary
            WebSocket speaking VHRP/1 over CBOR. All subsequent communication is out
            of OpenAPI scope.
        "400":
          description: Malformed upgrade request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /voice-agents:
    get:
      tags:
      - voice-agents
      summary: List voice agents
      description: Lists voice-agent identifiers exposed by the server realtime registry.
        The response intentionally hides provider and downstream connection details;
        clients receive only picker-safe metadata.
      operationId: listVoiceAgents
      responses:
        "200":
          description: Voice agents available to the authenticated user.
          content:
            application/json:
              schema:
                type: array
                items:
                  title: VoiceAgent
                  required:
                  - displayName
                  - id
                  - isAvailable
                  - isDefault
                  type: object
                  properties:
                    id:
                      minLength: 1
                      type: string
                      example: voice-agent-prod
                    displayName:
                      minLength: 1
                      type: string
                      example: voice-agent-prod
                    isDefault:
                      type: boolean
                      example: true
                    isAvailable:
                      type: boolean
                      description: >-
                        Whether the authenticated user may select and use this
                        voice agent. Public catalog items can be returned with
                        false so clients can render them as locked.
                      example: true
                  additionalProperties: false
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server configuration error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /text-agents:
    get:
      tags:
      - text-agents
      summary: List text agents
      description: List the authenticated user's text agent definitions.
      operationId: listTextAgents
      responses:
        "200":
          description: Text agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TextAgent'
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    post:
      tags:
      - text-agents
      summary: Create text agent
      description: "Create one text agent definition owned by the authenticated user.\
        \ The server generates the persistent text agent id. Provider, base URL, API\
        \ key, self-hosted, and hosted transport details are not accepted or returned."
      operationId: createTextAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextAgentWriteRequest'
        required: true
      responses:
        "201":
          description: Text agent created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextAgent'
        "400":
          description: "Invalid request, including unknown model id."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /text-agents/{textAgentId}:
    get:
      tags:
      - text-agents
      summary: Get text agent
      description: Get one text agent definition owned by the authenticated user.
      operationId: getTextAgent
      parameters:
      - name: textAgentId
        in: path
        description: Text agent identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      responses:
        "200":
          description: Text agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextAgent'
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - text-agents
      summary: Update text agent
      description: "Update one existing text agent definition owned by the authenticated\
        \ user. Missing resources are not created. Provider, base URL, API key, self-hosted,\
        \ and hosted transport details are not accepted or returned."
      operationId: updateTextAgent
      parameters:
      - name: textAgentId
        in: path
        description: Text agent identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextAgentWriteRequest'
        required: true
      responses:
        "200":
          description: Text agent updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextAgent'
        "400":
          description: "Invalid request, including unknown model id."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - text-agents
      summary: Delete text agent
      description: Delete one text agent definition owned by the authenticated user.
      operationId: deleteTextAgent
      parameters:
      - name: textAgentId
        in: path
        description: Text agent identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      responses:
        "204":
          description: Text agent deleted.
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /text-agents/{textAgentId}/query:
    post:
      tags:
      - text-agents
      summary: Query text agent
      description: "Execute one non-streaming text-agent step bound to an active voice-agent\
        \ session. The server owns the ephemeral conversation memory for the pair\
        \ `(voiceSessionId, textAgentId)` and does not expose thread resources, revision\
        \ counters, expiry timestamps, or provider-native continuation identifiers.\
        \ The client either submits a new prompt or returns one previously requested\
        \ tool result."
      operationId: queryTextAgent
      parameters:
      - name: textAgentId
        in: path
        description: Text agent identifier.
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
              - requestId
              - voiceSessionId
              type: object
              properties:
                voiceSessionId:
                  maxLength: 128
                  minLength: 1
                  type: string
                  description: Active hosted voice-agent session identifier. Text-agent
                    memory is scoped to this session and is discarded when the voice
                    session expires or ends.
                  example: vs_0123456789abcdef0123456789abcdef
                requestId:
                  maxLength: 128
                  minLength: 1
                  type: string
                  description: Client-generated idempotency and correlation identifier.
                  example: req_0123456789abcdef
                prompt:
                  minLength: 1
                  type: string
                  description: New user prompt for this step. Exactly one of `prompt`
                    or `toolResult` must be present. Prompt steps may include `images`;
                    tool-result continuation steps must not include images.
                  example: Summarize what the caller just said.
                images:
                  maxItems: 4
                  type: array
                  description: "Optional image attachments for this prompt step. Images\
                    \ are first-class multimodal input parts, not text embedded in\
                    \ the prompt. The client resolves semantic refs such as `attach_last_user_image`\
                    \ before calling this API. Each image must be a PNG or JPEG RFC\
                    \ 2397 data URI and 8 MiB or smaller after base64 decoding. Images\
                    \ are accepted only when `prompt` is present and are rejected\
                    \ on `toolResult` continuation steps."
                  items:
                    required:
                    - dataUri
                    type: object
                    properties:
                      dataUri:
                        minLength: 1
                        type: string
                        description: "RFC 2397 data URI containing a PNG or JPEG image,\
                          \ for example `data:image/png;base64,...`."
                        example: "data:image/png;base64,iVBORw0KGgo="
                      detail:
                        type: string
                        description: Provider vision detail level.
                        default: auto
                        enum:
                        - auto
                        - low
                        - high
                      name:
                        maxLength: 255
                        type: string
                        description: Optional user-visible source filename.
                        example: whiteboard.png
                    additionalProperties: false
                toolSchemas:
                  type: array
                  description: "Client-supplied schemas for Text Agent client-executable\
                    \ tools. Tool execution is client-side, so these schemas come\
                    \ from the client runtime tool registry, not from Voice Agent\
                    \ `tools.set` or Speed Dial exposed tools. The server filters\
                    \ this list by the persisted Text Agent `enabledTools` overrides\
                    \ and server policy before constructing provider requests."
                  items:
                    required:
                    - description
                    - name
                    - parameters
                    type: object
                    properties:
                      name:
                        maxLength: 128
                        minLength: 1
                        type: string
                        description: Client runtime tool name. Text Agent schemas
                          are supplied by the client because the client executes tools.
                        example: document_read
                      description:
                        type: string
                        description: AI-facing tool description supplied by the client
                          runtime registry.
                        example: Read the content of an active filesystem file by
                          path.
                      parameters:
                        type: object
                        description: JSON Schema object for tool parameters supplied
                          by the client runtime registry.
                        example:
                          type: object
                          properties:
                            path:
                              type: string
                              description: Absolute path of the active file to read.
                          required:
                          - path
                    additionalProperties: false
                toolResult:
                  required:
                  - isError
                  - output
                  - toolCallId
                  type: object
                  properties:
                    toolCallId:
                      maxLength: 128
                      minLength: 1
                      type: string
                      description: Server-issued tool call identifier.
                      example: tc_0123456789abcdef
                    output:
                      type: string
                      description: "JSON string tool output returned by the client\
                        \ runtime. `{\"success\":false,...}` may appear for compatibility,\
                        \ but failure is defined by `isError`, not by JSON fields\
                        \ inside `output`."
                      example: "{\"success\":true,\"text\":\"The selected note mentions\
                        \ a renewal clause.\"}"
                    isError:
                      type: boolean
                      description: Whether the submitted tool output represents a
                        tool execution failure.
                  additionalProperties: false
                  description: Tool result for one previously requested client-executable
                    tool call. Exactly one of `prompt` or `toolResult` must be present.
              additionalProperties: false
        required: true
      responses:
        "200":
          description: Text agent query result.
          content:
            application/json:
              schema:
                required:
                - status
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - completed
                    - requires_tool
                    - failed
                  text:
                    type: string
                    description: Final assistant text when `status` is `completed`.
                    example: The caller said they need the contract renewal terms
                      summarized.
                  toolCalls:
                    type: array
                    description: Client-executable tool calls when `status` is `requires_tool`.
                    items:
                      $ref: '#/components/schemas/TextAgentToolCall'
                  error:
                    required:
                    - code
                    - message
                    type: object
                    properties:
                      code:
                        maxLength: 128
                        minLength: 1
                        type: string
                        example: provider_unavailable
                      message:
                        minLength: 1
                        type: string
                        example: Text agent provider is temporarily unavailable.
                    additionalProperties: false
                    description: Failure details when `status` is `failed`.
                additionalProperties: false
        "400":
          description: "Invalid request, including malformed prompt or tool result\
            \ payload."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: "Voice session is not active, or the submitted tool result\
            \ does not match the current pending text-agent tool call state."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /text-agents/models:
    get:
      tags:
      - text-agent-models
      summary: List text agent model presets
      description: "Lists safe text-agent model preset metadata exposed by the server\
        \ text model registry. Provider, base URL, API key, self-hosted, and hosted\
        \ transport details are intentionally hidden."
      operationId: listTextAgentModels
      responses:
        "200":
          description: Text agent model presets available to the authenticated user.
          content:
            application/json:
              schema:
                type: array
                items:
                  required:
                  - displayName
                  - id
                  - isAvailable
                  - isDefault
                  type: object
                  properties:
                    id:
                      maxLength: 128
                      minLength: 1
                      type: string
                      example: text-agent-prod
                    displayName:
                      maxLength: 128
                      minLength: 1
                      type: string
                      example: text-agent-prod
                    isDefault:
                      type: boolean
                      example: true
                    isAvailable:
                      type: boolean
                      description: >-
                        Whether the authenticated user may select and use this
                        text agent model. Public catalog items can be returned
                        with false so clients can render them as locked.
                      example: true
                  additionalProperties: false
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server configuration error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
components:
  schemas:
    User:
      required:
      - accountLifecycle
      - createdAt
      - entitlements
      - id
      type: object
      properties:
        id:
          type: string
          example: "123"
        accountLifecycle:
          type: string
          enum:
          - created
          - active
          - paused
          - deleted
        displayName:
          type: string
          nullable: true
          example: Alice
        avatarUrl:
          type: string
          nullable: true
          example: https://avatars.githubusercontent.com/u/1?v=4
        entitlements:
          type: array
          description: Active entitlement keys currently effective for this user.
          items:
            type: string
            example: premium.voice
        createdAt:
          type: string
          format: date-time
    AuthTokenResponse:
      required:
      - accessToken
      - expiresIn
      - refreshToken
      - tokenType
      - user
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          example: 3600
        user:
          $ref: '#/components/schemas/User'
    ErrorResponse:
      required:
      - message
      type: object
      properties:
        message:
          type: string
    SessionThread:
      required:
      - id
      - items
      type: object
      properties:
        id:
          minLength: 1
          type: string
          description: Saved thread identifier.
        conversationId:
          type: string
          description: "Conversation identifier associated with the saved thread,\
            \ when available."
          nullable: true
        items:
          type: array
          description: Saved thread items. Entries are intentionally semi-opaque to
            preserve the realtime thread shape.
          items:
            type: object
            additionalProperties: true
      additionalProperties: false
    TextAgent:
      required:
      - enabledTools
      - id
      - name
      - prompt
      - textModelId
      type: object
      properties:
        id:
          maxLength: 128
          minLength: 1
          type: string
          example: ta_0123456789abcdef0123456789abcdef
        name:
          maxLength: 128
          minLength: 1
          type: string
          example: Research Assistant
        prompt:
          type: string
          nullable: true
          example: You are a careful research assistant.
        description:
          maxLength: 512
          type: string
          nullable: true
          example: Helps analyze long-form documents
        textModelId:
          maxLength: 128
          minLength: 1
          type: string
          description: Server registry text model preset id selected for this text
            agent.
          example: text-agent-prod
        enabledTools:
          type: object
          description: |
            Map from tool name to enabled flag. Values must be booleans.
            Provider, base URL, API key, self-hosted, and hosted transport details are
            intentionally absent from this public API schema.
          example:
            document_read: true
            document_patch: false
        createdAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    SpeedDial:
      required:
      - enabledTools
      - id
      - name
      - reasoningEffort
      - systemPrompt
      - toolChoiceRequired
      - voice
      - voiceAgentId
      type: object
      properties:
        id:
          maxLength: 128
          minLength: 1
          type: string
          example: sd_0123456789abcdef0123456789abcdef
        name:
          maxLength: 128
          minLength: 1
          type: string
          example: Default
        systemPrompt:
          minLength: 1
          type: string
          example: You are a helpful AI assistant.
        description:
          maxLength: 512
          type: string
          nullable: true
          example: Default voice assistant
        iconEmoji:
          maxLength: 16
          minLength: 1
          type: string
          nullable: true
          example: 🤖
        voice:
          maxLength: 64
          minLength: 1
          type: string
          example: alloy
        voiceAgentId:
          maxLength: 128
          minLength: 1
          type: string
          description: Server registry voice-agent id selected for this speed dial.
          example: voice-agent-prod
        reasoningEffort:
          type: string
          example: "off"
          default: "off"
          enum:
          - "off"
          - minimal
          - low
          - medium
          - high
          - xhigh
        toolChoiceRequired:
          type: boolean
          example: false
          default: false
        enabledTools:
          type: object
          description: |
            Map from tool name to enabled flag. Values must be booleans.
            Intentionally omit typed additionalProperties here because florval 0.3.12
            otherwise generates a runtime-unsafe Dart cast from decoded JSON to
            `Map<String, bool>`.
          example:
            document_read: true
            document_patch: false
        createdAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    SpeedDialCreateRequest:
      required:
      - enabledTools
      - name
      - reasoningEffort
      - systemPrompt
      - toolChoiceRequired
      - voice
      - voiceAgentId
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 1
          type: string
          example: Custom
        systemPrompt:
          minLength: 1
          type: string
          example: You are a helpful AI assistant.
        description:
          maxLength: 512
          type: string
          nullable: true
          example: Custom voice assistant
        iconEmoji:
          maxLength: 16
          minLength: 1
          type: string
          nullable: true
          example: 🤖
        voice:
          maxLength: 64
          minLength: 1
          type: string
          example: alloy
        voiceAgentId:
          maxLength: 128
          minLength: 1
          type: string
          description: Server registry voice-agent id selected for this speed dial.
          example: voice-agent-prod
        reasoningEffort:
          type: string
          example: "off"
          default: "off"
          enum:
          - "off"
          - minimal
          - low
          - medium
          - high
          - xhigh
        toolChoiceRequired:
          type: boolean
          example: false
          default: false
        enabledTools:
          type: object
          description: |
            Map from tool name to enabled flag. Values must be booleans.
            Intentionally omit typed additionalProperties here because florval 0.3.12
            otherwise generates a runtime-unsafe Dart cast from decoded JSON to
            `Map<String, bool>`.
          example:
            document_read: true
            document_patch: false
      additionalProperties: false
    SpeedDialUpdateRequest:
      required:
      - enabledTools
      - name
      - reasoningEffort
      - systemPrompt
      - toolChoiceRequired
      - voice
      - voiceAgentId
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 1
          type: string
          example: Custom
        systemPrompt:
          minLength: 1
          type: string
          example: You are a helpful AI assistant.
        description:
          maxLength: 512
          type: string
          nullable: true
          example: Custom voice assistant
        iconEmoji:
          maxLength: 16
          minLength: 1
          type: string
          nullable: true
          example: 🤖
        voice:
          maxLength: 64
          minLength: 1
          type: string
          example: alloy
        voiceAgentId:
          maxLength: 128
          minLength: 1
          type: string
          description: Server registry voice-agent id selected for this speed dial.
          example: voice-agent-prod
        reasoningEffort:
          type: string
          example: "off"
          default: "off"
          enum:
          - "off"
          - minimal
          - low
          - medium
          - high
          - xhigh
        toolChoiceRequired:
          type: boolean
          example: false
          default: false
        enabledTools:
          type: object
          description: |
            Map from tool name to enabled flag. Values must be booleans.
            Intentionally omit typed additionalProperties here because florval 0.3.12
            otherwise generates a runtime-unsafe Dart cast from decoded JSON to
            `Map<String, bool>`.
          example:
            document_read: true
            document_patch: false
      additionalProperties: false
    VfsRpcRequest:
      required:
      - id
      - jsonrpc
      - method
      - params
      type: object
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JsonRpcVersion'
        id:
          maxLength: 128
          minLength: 1
          type: string
        method:
          $ref: '#/components/schemas/VfsMethod'
        params:
          $ref: '#/components/schemas/VfsRpcParams'
      additionalProperties: false
    JsonRpcVersion:
      type: string
      enum:
      - "2.0"
    VfsMethod:
      type: string
      enum:
      - vfs.list
      - vfs.read
      - vfs.write
      - vfs.move
      - vfs.delete
    VfsRpcParams:
      minProperties: 1
      type: object
      properties:
        path:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
        recursive:
          type: boolean
          default: false
        content:
          type: string
          example: '# Today'
        fromPath:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
        toPath:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
      additionalProperties: false
      description: |
        Aggregated JSON-RPC params envelope.
        The server validates field combinations according to `method`.
        - `vfs.list` expects the shape of `VfsListParams`
        - `vfs.read` expects the shape of `VfsReadParams`
        - `vfs.write` expects the shape of `VfsWriteParams`
        - `vfs.move` expects the shape of `VfsMoveParams`
        - `vfs.delete` expects the shape of `VfsDeleteParams`
    VfsRpcResponse:
      required:
      - id
      - jsonrpc
      type: object
      properties:
        jsonrpc:
          $ref: '#/components/schemas/JsonRpcVersion'
        id:
          maxLength: 128
          minLength: 1
          type: string
        result:
          $ref: '#/components/schemas/VfsRpcResult'
        error:
          $ref: '#/components/schemas/VfsRpcError'
      additionalProperties: false
      description: |
        Exactly one of `result` or `error` is expected in a valid response.
    VfsRpcResult:
      type: object
      properties:
        entries:
          type: array
          items:
            minLength: 1
            type: string
        file:
          $ref: '#/components/schemas/VfsFile'
        path:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
        fromPath:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
        toPath:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
      additionalProperties: false
      description: |
        Aggregated JSON-RPC success result envelope.
        The server emits fields according to `method`.
        - `vfs.list` returns the shape of `VfsListResult`
        - `vfs.read` returns the shape of `VfsReadResult`
        - `vfs.write` returns the shape of `VfsWriteResult`
        - `vfs.move` returns the shape of `VfsMoveResult`
        - `vfs.delete` returns the shape of `VfsDeleteResult`
    VfsFile:
      required:
      - content
      - path
      type: object
      properties:
        path:
          maxLength: 512
          minLength: 1
          pattern: ^/.*$
          type: string
        content:
          type: string
          example: '# Today'
      additionalProperties: false
    VfsRpcError:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: integer
          format: int32
          example: -32602
        message:
          minLength: 1
          type: string
          example: Invalid params
        data:
          type: object
          additionalProperties: true
      additionalProperties: false
    TextAgentWriteRequest:
      required:
      - enabledTools
      - name
      - prompt
      - textModelId
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 1
          type: string
          example: Research Assistant
        prompt:
          type: string
          example: You are a careful research assistant.
        description:
          maxLength: 512
          type: string
          nullable: true
          example: Helps analyze long-form documents
        textModelId:
          maxLength: 128
          minLength: 1
          type: string
          description: Server registry text model preset id selected for this text
            agent.
          example: text-agent-prod
        enabledTools:
          type: object
          description: |
            Map from tool name to enabled flag. Values must be booleans.
            Provider, base URL, API key, self-hosted, and hosted transport details are
            intentionally absent from this public API schema.
          example:
            document_read: true
            document_patch: false
      additionalProperties: false
    TextAgentToolCall:
      required:
      - arguments
      - id
      - name
      type: object
      properties:
        id:
          maxLength: 128
          minLength: 1
          type: string
          description: Server-generated tool call identifier to use when submitting
            a tool result.
          example: tc_0123456789abcdef
        name:
          maxLength: 128
          minLength: 1
          type: string
          description: Client-executable tool name recognized by the client runtime
            for this pending step.
          example: document_read
        arguments:
          minLength: 2
          type: string
          description: JSON string arguments for the client-executable tool. This
            matches the current client tool runtime shape.
          example: "{\"documentId\":\"doc_0123456789abcdef\"}"
      additionalProperties: false
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
